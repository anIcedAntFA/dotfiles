# Git branch module
[git_branch]
symbol = "\uf418 " # Branch icon
# truncation_length = 4 # Uncomment to truncate branch names
truncation_symbol = ''
# format = '\[[$symbol$branch]($style)\]' # Example format, default is often good

# Git state module (e.g., rebasing, merging)
[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[\U0001f352 PICKING](bold red)' # Cherry icon for cherry-picking

# Git status module: Displays the state of the Git repository
[git_status]
# The 'format' string implicitly uses the definitions below via $all_status and $ahead_behind.
# Do NOT try to put 'git_status.up_to_date' directly in this format string.
format = '([\[$all_status$ahead_behind\]]($style))'
style = 'bold red' # Default style for the entire git_status module

# Individual status indicators and their symbols/formats:
conflicted = '\U0001f3f3' # Flag for merge conflicts
up_to_date = ''			# Checkmark for up-to-date branch
untracked = '\U0001f937'	# Person shrugging for untracked files
stashed = '\U0001f4e6 contained ${count}' # Package box for stashed changes
modified = '\U0001f4dd'		# Memo for modified files
staged = '[++\($count\)](green)' # Plus signs for staged changes (with count)
renamed = '\U0001f445'		# Mouth for renamed files
deleted = '\U0001f5d1'		# Wastebasket for deleted files
ahead = '\u21e1${count}'	# Up arrow with count for commits ahead
diverged = '\u21d5\u21e1${ahead_count}\u21e3${behind_count}' # Up-down arrow with counts for diverged
behind = '\u21e3${count}' # Down arrow with count for commits behind

