[battery]
full_symbol = '\U0001f50b '
charging_symbol = '\u26a1\ufe0f '
discharging_symbol = '\U0001f480 '

[[battery.display]] # 'bold red' style and discharging_symbol when capacity is between 0% and 10%
threshold = 10
style = 'bold red' 

[[battery.display]] # 'bold yellow' style and \U0001f4a6 symbol when capacity is between 10% and 30%
threshold = 30
style = 'bold yellow'
discharging_symbol = '\U0001f4a6'

# when capacity is over 30%, the battery indicator will not be displayed

