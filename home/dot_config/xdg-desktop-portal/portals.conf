[preferred]
default=wlr
org.freedesktop.impl.portal.Screenshot=wlr
org.freedesktop.impl.portal.ScreenCast=wlr
# wlr has no Settings implementation, so unlisted-default=wlr left apps
# (Ghostty, Chrome) unable to read the system dark/light preference --
# Settings.Read always failed with "Requested setting not found". gtk does
# implement it, reading gsettings under the hood.
org.freedesktop.impl.portal.Settings=gtk
