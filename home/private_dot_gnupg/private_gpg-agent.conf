# gpg-agent config — https://www.gnupg.org/documentation/manuals/gnupg/Agent-Options.html
# This is the ONLY file tracked from ~/.gnupg. Private keys, trustdb, and the
# random seed live in the same directory but are NEVER committed (see gopass.md).
# chezmoi applies ~/.gnupg as 0700 and this file as 0600 (private_ prefix).

# pinentry-curses draws the passphrase prompt in the active terminal — no GUI or
# dbus needed, works over SSH, and fits the terminal-first (Ghostty + niri) setup.
# Requires GPG_TTY to be exported (config.fish does this).
pinentry-program /usr/bin/pinentry-curses

# Passphrase cache: remember it for 1h of idle, 2h maximum, so a gopass session
# isn't re-prompted on every `gopass show` while still expiring reasonably.
default-cache-ttl 3600
max-cache-ttl 7200
