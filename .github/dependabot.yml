# Keep tooling fresh — https://docs.github.com/code-security/dependabot
version: 2
updates:
  # No npm/language ecosystem: dev tooling is pinned in mise.toml (dprint, rumdl,
  # …), which Dependabot doesn't track. Those pin to "latest" and update on
  # `mise install`. See docs/adr/0007-node-free-toolchain-via-mise.md.

  # GitHub Actions used by the CI workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
