name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit

      # Installs mise, trusts the repo config, and runs `mise install` — this
      # provisions dprint, rumdl, just, lefthook, gitleaks, shfmt and shellcheck
      # from mise.toml and puts them on PATH for the steps below. No Node.
      - uses: jdx/mise-action@v4
        env:
          # Auth the aqua/ubi backends (rumdl) against the GitHub API to dodge
          # anonymous rate limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # fish ships fish_indent; it is not mise-managed.
      - name: Install fish (for fish_indent)
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Run all checks
        run: just check
