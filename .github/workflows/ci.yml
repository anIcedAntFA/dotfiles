name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install shell, fish and secret-scanning tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck fish
          curl -sSfL "https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64" -o /tmp/shfmt
          sudo install -m755 /tmp/shfmt /usr/local/bin/shfmt
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          sudo install -m755 /tmp/gitleaks /usr/local/bin/gitleaks

      - uses: extractions/setup-just@v4

      - name: Run all checks
        run: just check
