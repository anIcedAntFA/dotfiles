[terminal]
# The VT to run the greeter on. Can be "next", "current" or a number
# designating the VT.
vt = 2

# The default session, also known as the greeter.
[default_session]
# `agreety` is the bundled agetty/login-lookalike. You can replace `/bin/sh`
# with whatever you want started, such as `sway`.
# command = "tuigreet --time --sessions /usr/share/wayland-sessions"
command = "tuigreet --time --time-format '%H:%M • %a %d %b' --greeting 'Arch • Niri • Noctalia' --asterisks --sessions /usr/share/wayland-sessions --theme 'container=black;border=blue;text=white;prompt=cyan;input=green;action=blue;button=yellow;time=magenta' --power-shutdown 'systemctl poweroff' --power-reboot 'systemctl reboot' --window-padding 2 --container-padding 2"

# The user to run the command as. The privileges this user must have depends
# on the greeter. A graphical greeter may for example require the user to be
# in the `video` group.
user = "greeter"
